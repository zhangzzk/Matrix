[defaults]
workspace = ".dreamdive"
session_id = "main"

[ingest]
source = "resources/dragonraja1_demo.txt"
rerun_structural_scan = false
rerun_chapters = false
rerun_meta_layer = false
rerun_entities = false

[init-snapshot]
source = "resources/dragonraja1_demo.txt"
chapter_id = "002"
tick_label = "snapshot"
timeline_index = 0
overwrite = true
max_workers = 16

[run]
ticks = 5
overwrite = true
tick_max_events = 15

[branch]
overwrite = false

[profiles.debug]
debug = true
debug_dir = "/tmp/dreamdive-debug"
